<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MangaHub — Résolution Slugs Comick</title>
<style>
  body { font-family: monospace; background: #0d0d0d; color: #ccc; padding: 20px; }
  h1   { color: #ff6a00; }
  #log { white-space: pre; font-size: 13px; line-height: 1.6; }
  .ok  { color: #4cff91; }
  .err { color: #ff4c4c; }
  .info{ color: #4caaff; }
  #output { margin-top: 20px; background: #1a1a1a; padding: 16px; border-radius: 8px;
            border: 1px solid #333; white-space: pre; font-size: 12px; color: #ffe066;
            max-height: 400px; overflow-y: auto; }
  button { margin-top: 16px; padding: 10px 24px; background: #ff6a00; color: #fff;
           border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  button:disabled { background: #555; cursor: not-allowed; }
  #copyBtn { background: #1a7a3a; margin-left: 10px; }
</style>
</head>
<body>
<h1>🔍 MangaHub — Résolution des Slugs Comick</h1>
<p>Ce script interroge <code>api.comick.fun</code> via ton proxy local (<code>http://localhost:8080/comick</code>) pour trouver les slugs/hid de tes 60 mangas.</p>
<button id="startBtn" onclick="startResolving()">▶ Lancer la résolution</button>
<button id="copyBtn" onclick="copyOutput()" disabled>📋 Copier le bloc SLUGS_CONFIRMED</button>
<div id="log"></div>
<div id="output" style="display:none"></div>

<script>
const PROXY = 'http://localhost:8080/comick';
const DELAY = 400; // ms entre chaque requête

const MANGAS = {
    1:  ['Berserk'],
    2:  ['Vagabond'],
    3:  ['Vinland Saga'],
    4:  ['Monster'],
    5:  ['Pluto'],
    6:  ['Dorohedoro'],
    7:  ['Dungeon Meshi'],
    8:  ['Mushishi'],
    9:  ['Blame!'],
    10: ['Biomega'],
    11: ['Oyasumi Punpun'],
    12: ['Solanin'],
    13: ['Blue Period'],
    14: ['Houseki no Kuni'],
    15: ['Slam Dunk'],
    16: ['Hajime no Ippo'],
    17: ['Haikyuu!!'],
    18: ['20th Century Boys'],
    19: ['Devilman'],
    20: ['Gantz'],
    21: ['Yotsuba&!'],
    22: ['Parasyte'],
    23: ['Ashita no Joe'],
    24: ['Hellsing'],
    25: ['Beck'],
    26: ['Fullmetal Alchemist'],
    27: ['Hunter x Hunter'],
    28: ['Dragon Ball'],
    29: ['Naruto'],
    30: ['Attack on Titan'],
    31: ['One Piece'],
    32: ['Demon Slayer'],
    33: ['Fairy Tail'],
    34: ['Death Note'],
    35: ['Bleach'],
    36: ['Great Teacher Onizuka'],
    37: ['Magi'],
    38: ['My Hero Academia'],
    39: ['Nana'],
    40: ['Fruits Basket'],
    41: ['Cardcaptor Sakura'],
    42: ['Sailor Moon'],
    43: ['Baki'],
    44: ['Yokohama Kaidashi Kikou'],
    45: ['Golden Kamuy'],
    46: ['Fire Punch'],
    47: ['Chainsaw Man'],
    48: ['Jujutsu Kaisen'],
    49: ['Spy x Family'],
    50: ['Tokyo Ghoul'],
    51: ['Made in Abyss'],
    52: ['Dr. Stone'],
    53: ['The Promised Neverland'],
    54: ['One-Punch Man'],
    55: ['Mob Psycho 100'],
    56: ['Akira'],
    57: ['Nausicaa'],
    58: ['Initial D'],
    59: ['Claymore'],
    60: ['Rurouni Kenshin'],
};

const NAMES = {
    1:'Berserk',2:'Vagabond',3:'Vinland Saga',4:'Monster',5:'Pluto',
    6:'Dorohedoro',7:'Dungeon Meshi',8:'Mushishi',9:'Blame!',10:'Biomega',
    11:'Oyasumi Punpun',12:'Solanin',13:'Blue Period',14:'Houseki no Kuni',
    15:'Slam Dunk',16:'Hajime no Ippo',17:'Haikyuu!!',18:'20th Century Boys',
    19:'Devilman',20:'Gantz',21:'Yotsuba',22:'Parasyte',23:'Ashita no Joe',
    24:'Hellsing',25:'Beck',26:'Fullmetal Alchemist',27:'Hunter x Hunter',
    28:'Dragon Ball',29:'Naruto',30:'Attack on Titan',31:'One Piece',
    32:'Demon Slayer',33:'Fairy Tail',34:'Death Note',35:'Bleach',
    36:'GTO',37:'Magi',38:'My Hero Academia',39:'Nana',40:'Fruits Basket',
    41:'Cardcaptor Sakura',42:'Sailor Moon',43:'Baki',44:'Yokohama Kaidashi Kikou',
    45:'Golden Kamuy',46:'Fire Punch',47:'Chainsaw Man',48:'Jujutsu Kaisen',
    49:'Spy x Family',50:'Tokyo Ghoul',51:'Made in Abyss',52:'Dr. Stone',
    53:'The Promised Neverland',54:'One-Punch Man',55:'Mob Psycho 100',
    56:'Akira',57:'Nausicaä',58:'Initial D',59:'Claymore',60:'Rurouni Kenshin',
};

const logEl = document.getElementById('log');
const outEl = document.getElementById('output');

function log(msg, cls='') {
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = msg + '\n';
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
}

// Recherche via Comick API
// GET /v1.0/search/?q=berserk&limit=5
async function searchComick(title) {
    const url = `${PROXY}/v1.0/search/?q=${encodeURIComponent(title)}&limit=5`;
    try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        // Comick retourne un tableau directement
        const results = Array.isArray(data) ? data : (data.data || data.comics || []);
        if (!results.length) return null;
        // Premier résultat : { slug, hid, title, ... }
        const hit = results[0];
        return hit;
    } catch(e) {
        return null;
    }
}

async function resolveOne(id, titles) {
    for (const title of titles) {
        const hit = await searchComick(title);
        if (hit && (hit.slug || hit.hid)) {
            return {
                slug: hit.slug || '',
                hid:  hit.hid  || '',
                name: hit.title || hit.slug || title,
            };
        }
        await sleep(DELAY);
    }
    return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

const results = {}; // { id: { slug, hid } }

async function startResolving() {
    document.getElementById('startBtn').disabled = true;
    logEl.innerHTML = '';
    log('🚀 Démarrage résolution Comick... (proxy: ' + PROXY + ')\n', 'info');

    const ids = Object.keys(MANGAS).map(Number).sort((a,b) => a-b);
    let ok = 0, fail = 0;

    for (let i = 0; i < ids.length; i++) {
        const id     = ids[i];
        const titles = MANGAS[id];
        const label  = `[${String(id).padStart(2,'0')}/${ids.length}] ${NAMES[id].padEnd(30)}`;

        const hit = await resolveOne(id, titles);

        if (hit) {
            results[id] = hit;
            log(`${label} ✅ slug=${hit.slug}  hid=${hit.hid}  (${hit.name.slice(0,20)})`, 'ok');
            ok++;
        } else {
            log(`${label} ❌ INTROUVABLE`, 'err');
            fail++;
        }

        await sleep(DELAY);
    }

    log(`\n✅ ${ok} résolus  ❌ ${fail} échecs\n`, 'info');
    generateOutput();
}

function generateOutput() {
    const ids = Object.keys(MANGAS).map(Number).sort((a,b) => a-b);
    let bloc = '    const COMICK_SLUGS = {\n';
    for (const id of ids) {
        const r    = results[id];
        const name = NAMES[id];
        if (r) {
            bloc += `        ${String(id).padEnd(3)}: { slug: '${r.slug}', hid: '${r.hid}' }, // ${name}\n`;
        } else {
            bloc += `        // ${String(id).padEnd(2)}: INTROUVABLE — ${name}\n`;
        }
    }
    bloc += '    };';

    outEl.textContent = bloc;
    outEl.style.display = 'block';
    document.getElementById('copyBtn').disabled = false;
    log('\n📋 Bloc COMICK_SLUGS généré ci-dessous. Copie-le dans chaptersdb.js\n', 'info');
}

function copyOutput() {
    navigator.clipboard.writeText(outEl.textContent).then(() => {
        document.getElementById('copyBtn').textContent = '✅ Copié !';
        setTimeout(() => {
            document.getElementById('copyBtn').textContent = '📋 Copier le bloc COMICK_SLUGS';
        }, 2000);
    });
}
</script>
</body>
</html>
